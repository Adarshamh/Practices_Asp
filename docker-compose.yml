services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: student-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  student-api:
    build:
      context: ./StudentManagement.Api
    container_name: student-api
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver

volumes:
  sql_data:
