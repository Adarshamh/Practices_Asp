name: .NET CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test --no-build --verbosity normal

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/studentmanagement-api:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/studentmanagement-api:${{ github.run_number }} \
            ./StudentManagement.Api

      - name: Push Latest Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/studentmanagement-api:latest

      - name: Push Version Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/studentmanagement-api:${{ github.run_number }}